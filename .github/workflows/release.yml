name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Strip leading 'v' for npm version
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Version: $VERSION"

      - name: Generate categorized changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s|||%h" "$PREV_TAG".."$VERSION")
          else
            COMMITS=$(git log --pretty=format:"%s|||%h" -30)
          fi

          FEATS=""; FIXES=""; DOCS=""; REFACTORS=""; CHORES=""; OTHERS=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            MSG="${line%%|||*}"
            HASH="${line##*|||}"
            DISPLAY_MSG="$MSG"

            case "$MSG" in
              feat*:*|feat*) FEATS="${FEATS}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n" ;;
              fix*:*|fix*)   FIXES="${FIXES}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n" ;;
              docs*:*|docs*) DOCS="${DOCS}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n" ;;
              refactor*:*)   REFACTORS="${REFACTORS}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n" ;;
              chore*:*|ci*:*) CHORES="${CHORES}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n" ;;
              *)             OTHERS="${OTHERS}- ${DISPLAY_MSG} (\`$HASH\`)\n" ;;
            esac
          done <<< "$COMMITS"

          build_section() {
            local title="$1" content="$2"
            [ -n "$content" ] && echo "### $title" && echo -e "$content"
          }

          {
            echo "## tGD-pi-web $VERSION"
            echo ""
            build_section "✨ Features" "$FEATS"
            build_section "🐛 Bug Fixes" "$FIXES"
            build_section "📝 Documentation" "$DOCS"
            build_section "♻️ Refactoring" "$REFACTORS"
            build_section "🔧 Chores" "$CHORES"
            build_section "📦 Other Changes" "$OTHERS"

            if [ -n "$PREV_TAG" ]; then
              echo "---"
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}"
            fi
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "tGD-pi-web ${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md \
            --latest
