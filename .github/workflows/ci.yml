name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: node_modules/.bin/tsc --noEmit

      - name: Lint
        run: node node_modules/.bin/next lint
        continue-on-error: true

  # Build is tested locally via scripts/release.sh before publish.
  # CI focuses on typecheck + lint — `next build` fails on GitHub Actions
  # because pi-coding-agent uses undici internals incompatible with
  # Next.js static page-data collection. See AGENTS.md.
