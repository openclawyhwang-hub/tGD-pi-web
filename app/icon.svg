<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0a1d"/>
      <stop offset="50%" stop-color="#1a1145"/>
      <stop offset="100%" stop-color="#0f0d2e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#4f46e5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <rect width="512" height="512" fill="url(#orbGlow)" clip-path="url(#round)"/>

  <!-- Decorative circuit lines -->
  <g clip-path="url(#round)" stroke="#3b82f6" stroke-opacity="0.08" stroke-width="1" fill="none">
    <path d="M0 200 H180 L200 180 H312 L332 200 H512"/>
    <path d="M0 320 H150 L170 340 H342 L362 320 H512"/>
    <circle cx="180" cy="200" r="3" fill="#3b82f6" fill-opacity="0.15"/>
    <circle cx="332" cy="200" r="3" fill="#3b82f6" fill-opacity="0.15"/>
    <circle cx="150" cy="320" r="3" fill="#3b82f6" fill-opacity="0.15"/>
    <circle cx="362" cy="320" r="3" fill="#3b82f6" fill-opacity="0.15"/>
  </g>

  <!-- Corner accent dots -->
  <g clip-path="url(#round)">
    <circle cx="60" cy="60" r="2" fill="#3b82f6" opacity="0.3"/>
    <circle cx="452" cy="60" r="2" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="60" cy="452" r="2" fill="#06b6d4" opacity="0.3"/>
    <circle cx="452" cy="452" r="2" fill="#3b82f6" opacity="0.3"/>
  </g>

  <!-- Main text "t" in accent color -->
  <text x="256" y="295" text-anchor="middle" font-family="'SF Pro Display','Inter','Helvetica Neue',system-ui,sans-serif" font-size="240" font-weight="800" letter-spacing="-8" filter="url(#glow)">
    <tspan fill="url(#accent1)">t</tspan><tspan fill="white" opacity="0.95">GD</tspan>
  </text>

  <!-- Accent underline -->
  <rect x="140" y="330" width="232" height="3" rx="1.5" fill="url(#accent2)" opacity="0.5" filter="url(#softGlow)"/>

  <!-- Subtle "AGENT" label -->
  <text x="256" y="380" text-anchor="middle" font-family="'SF Pro Text','Inter','Helvetica Neue',system-ui,sans-serif" font-size="32" font-weight="500" fill="#64748b" letter-spacing="14">AGENT</text>
</svg>
